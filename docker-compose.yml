version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: eduai-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eduai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: eduai-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/eduai
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
